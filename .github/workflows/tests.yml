name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.0", "8.1", "8.2", "8.3"]

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, gd
          coverage: xdebug
          tools: composer:v2

      - name: Check PHP version and extensions
        run: |
          php -v
          php -m | grep -E 'mbstring|gd|SPL' || echo "Some extensions missing"
          php -r "echo extension_loaded('gd') ? 'GD loaded' : 'GD not loaded'; echo PHP_EOL;"

      - name: Test GD functions
        run: |
          php -r "
          $im = @imagecreatetruecolor(100, 100);
          if ($im) {
            echo 'GD functions work' . PHP_EOL;
            imagedestroy($im);
          } else {
            echo 'GD functions failed' . PHP_EOL;
            exit(1);
          }
          "

      - name: Validate composer.json
        run: composer validate

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests
        run: ./vendor/bin/phpunit --testdox

      - name: Upload coverage reports
        if: matrix.php-version == '8.3'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage.xml
          fail_ci_if_error: false

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check for security vulnerabilities
        run: composer audit || true

      - name: Check PHP syntax
        run: find src tests -name "*.php" -exec php -l {} \; || true
